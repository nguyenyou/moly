<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="gold" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </radialGradient>
  </defs>

  <!-- 6 white petals with stroke for light bg visibility -->
  <g transform="translate(32, 32)">
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(120)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(180)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(240)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5" transform="rotate(300)"/>
  </g>

  <!-- Golden center -->
  <circle cx="32" cy="32" r="7" fill="url(#gold)"/>
  <circle cx="32" cy="32" r="3" fill="#FFF5CC" opacity="0.7"/>
</svg>
