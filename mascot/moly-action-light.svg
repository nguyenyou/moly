<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8961E"/>
    </radialGradient>
    <radialGradient id="petal-grad" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </radialGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4881A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- Font style -->
    <style>
      .code-text { font-family: 'Courier New', monospace; }
      .json-text { font-family: 'Courier New', monospace; }
    </style>
  </defs>

  <!-- LEFT SIDE: Byte stream -->
  <g opacity="0.9">
    <text class="code-text" x="10" y="120" fill="#047857" font-size="13" opacity="0.5">0x48 0x65 0x6C</text>
    <text class="code-text" x="25" y="145" fill="#047857" font-size="14" opacity="0.7">0xFF 0x01 0xA3</text>
    <text class="code-text" x="5" y="170" fill="#047857" font-size="15" opacity="0.85">0x7B 0x22 0x6E</text>
    <text class="code-text" x="30" y="195" fill="#047857" font-size="16" opacity="1.0">0x61 0x6D 0x65</text>
    <text class="code-text" x="10" y="220" fill="#047857" font-size="15" opacity="0.85">0x22 0x3A 0x22</text>
    <text class="code-text" x="25" y="245" fill="#047857" font-size="14" opacity="0.7">0x42 0x6F 0x62</text>
    <text class="code-text" x="15" y="270" fill="#047857" font-size="13" opacity="0.5">0x22 0x7D 0x0A</text>
  </g>

  <!-- Flow arrows left side -->
  <g opacity="0.6">
    <path d="M185 160 L245 175" stroke="#047857" stroke-width="2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M185 195 L245 195" stroke="#047857" stroke-width="2.5" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M185 230 L245 215" stroke="#047857" stroke-width="2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- BEHIND FLOWER: Fading JSON tree (crossed out / ghosted) -->
  <g transform="translate(290, 60)" opacity="0.15">
    <text class="json-text" x="0" y="0" fill="#DC2626" font-size="11">{</text>
    <text class="json-text" x="10" y="18" fill="#DC2626" font-size="11">"name": "Bob",</text>
    <text class="json-text" x="10" y="36" fill="#DC2626" font-size="11">"age": 30,</text>
    <text class="json-text" x="10" y="54" fill="#DC2626" font-size="11">"active": true</text>
    <text class="json-text" x="0" y="72" fill="#DC2626" font-size="11">}</text>
    <!-- X through JSON -->
    <line x1="-5" y1="-8" x2="130" y2="78" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
    <line x1="130" y1="-8" x2="-5" y2="78" stroke="#DC2626" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- CENTER: Moly flower mascot -->
  <g filter="soft-shadow">
    <!-- Root -->
    <path d="M350 265 L350 340 Q348 358 342 368 Q336 375 330 378"
          stroke="#1C1C1C" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M350 310 Q356 325 362 340"
          stroke="#1C1C1C" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Petals -->
    <g transform="translate(350, 195)">
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(0)"/>
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(60)"/>
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(120)"/>
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(180)"/>
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(240)"/>
      <ellipse cx="0" cy="-52" rx="25" ry="42" fill="url(#petal-grad)" stroke="#D0D0D0" stroke-width="1" transform="rotate(300)"/>
    </g>

    <!-- Golden center -->
    <circle cx="350" cy="195" r="26" fill="url(#center-glow)" filter="glow"/>

    <!-- Face -->
    <ellipse cx="340" cy="191" rx="4" ry="4.5" fill="#2D2D2D"/>
    <ellipse cx="360" cy="191" rx="4" ry="4.5" fill="#2D2D2D"/>
    <circle cx="342" cy="189" r="1.5" fill="#FFF" opacity="0.9"/>
    <circle cx="362" cy="189" r="1.5" fill="#FFF" opacity="0.9"/>
    <path d="M343 203 Q350 208 357 203" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Shield (left side, facing the JSON) -->
    <g transform="translate(310, 210) rotate(-5)">
      <path d="M0 -14 L14 -7 L14 7 Q14 22 0 28 Q-14 22 -14 7 L-14 -7 Z"
            fill="url(#shield-grad)" stroke="#D4881A" stroke-width="1.5"/>
      <circle cx="0" cy="4" r="3" fill="#FFF" opacity="0.6"/>
    </g>
  </g>

  <!-- Flow arrows right side -->
  <g opacity="0.6">
    <path d="M460 175 L520 160" stroke="#2563EB" stroke-width="2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M460 195 L520 195" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M460 215 L520 230" stroke="#2563EB" stroke-width="2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- RIGHT SIDE: Case class output -->
  <g opacity="0.9">
    <text class="code-text" x="545" y="140" fill="#2563EB" font-size="13" opacity="0.6">case class User(</text>
    <text class="code-text" x="560" y="165" fill="#2563EB" font-size="14" opacity="0.8">name: String,</text>
    <text class="code-text" x="560" y="190" fill="#7C3AED" font-size="15" opacity="1.0">age: Int,</text>
    <text class="code-text" x="560" y="215" fill="#2563EB" font-size="14" opacity="0.8">active: Boolean</text>
    <text class="code-text" x="545" y="240" fill="#2563EB" font-size="13" opacity="0.6">)</text>
  </g>

  <!-- Labels -->
  <text x="75" y="50" fill="#047857" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.6" letter-spacing="2">BYTES</text>
  <text x="350" y="50" fill="#B8860B" font-family="sans-serif" font-size="13" text-anchor="middle" opacity="0.7" letter-spacing="2" font-weight="bold">MOLY</text>
  <text x="620" y="50" fill="#2563EB" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.6" letter-spacing="2">TYPES</text>

  <!-- Subtle divider lines -->
  <line x1="350" y1="60" x2="350" y2="75" stroke="#B8860B" stroke-width="1" opacity="0.3"/>
</svg>
