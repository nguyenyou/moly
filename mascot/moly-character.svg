<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8961E"/>
    </radialGradient>
    <radialGradient id="petal-grad" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </radialGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4881A"/>
    </linearGradient>
    <linearGradient id="shield-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5CC"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="#1A1A2E" rx="20"/>

  <!-- Root system -->
  <g>
    <path d="M200 290 L200 400 Q198 425 190 440 Q182 452 172 458" 
          stroke="#1C1C1C" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M200 350 Q208 375 220 395 Q228 408 226 418" 
          stroke="#1C1C1C" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M200 330 Q190 348 184 360" 
          stroke="#1C1C1C" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Small root detail -->
    <path d="M200 370 Q210 378 214 386" 
          stroke="#1C1C1C" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Petals -->
  <g filter="soft-shadow" transform="translate(200, 210)">
    <!-- 6 petals -->
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(120)"/>
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(240)"/>
    <ellipse cx="0" cy="-65" rx="32" ry="52" fill="url(#petal-grad)" transform="rotate(300)"/>
  </g>

  <!-- Golden center / face area -->
  <circle cx="200" cy="210" r="34" fill="url(#center-glow)" filter="glow"/>

  <!-- Face -->
  <g>
    <!-- Eyes - confident, calm -->
    <ellipse cx="188" cy="205" rx="5" ry="5.5" fill="#2D2D2D"/>
    <ellipse cx="212" cy="205" rx="5" ry="5.5" fill="#2D2D2D"/>
    <!-- Eye highlights -->
    <circle cx="190" cy="203" r="2" fill="#FFF" opacity="0.9"/>
    <circle cx="214" cy="203" r="2" fill="#FFF" opacity="0.9"/>
    
    <!-- Subtle confident smile -->
    <path d="M192 218 Q200 224 208 218" 
          stroke="#2D2D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Shield held by left petal-hand -->
  <g transform="translate(128, 228) rotate(-10)">
    <!-- Shield shape -->
    <path d="M0 -18 L18 -10 L18 10 Q18 28 0 36 Q-18 28 -18 10 L-18 -10 Z" 
          fill="url(#shield-grad)" stroke="#D4881A" stroke-width="2"/>
    <!-- Shield inner detail -->
    <path d="M0 -10 L10 -5 L10 6 Q10 18 0 24 Q-10 18 -10 6 L-10 -5 Z" 
          fill="url(#shield-inner)" opacity="0.6"/>
    <!-- Shield emblem - small star/spark -->
    <path d="M0 2 L3 -4 L0 -2 L-3 -4 Z" fill="#FFF" opacity="0.8"/>
    <path d="M0 2 L3 8 L0 6 L-3 8 Z" fill="#FFF" opacity="0.8"/>
    <circle cx="0" cy="2" r="2.5" fill="#FFF" opacity="0.7"/>
  </g>

  <!-- Petal-arm connection to shield (subtle line showing it's being held) -->
  <path d="M145 240 Q138 235 132 230" stroke="#E0E0E0" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
