<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <radialGradient id="gold" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </radialGradient>
  </defs>
  <!-- Ultra-simplified: just petals + gold center at favicon scale -->
  <g transform="translate(8, 8)">
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(0)"/>
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(60)"/>
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(120)"/>
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(180)"/>
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(240)"/>
    <ellipse cx="0" cy="-3.8" rx="2" ry="3.2" fill="#FFF" stroke="#D0D0D0" stroke-width="0.15" transform="rotate(300)"/>
  </g>
  <circle cx="8" cy="8" r="2" fill="url(#gold)"/>
  <circle cx="8" cy="8" r="0.85" fill="#FFF5CC" opacity="0.7"/>
</svg>
